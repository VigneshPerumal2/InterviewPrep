<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visa Fullstack Senior SWE Prep</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-mark">V</span>
          <span class="logo-text">Visa Fullstack Prep</span>
        </div>
        <div class="stats">
          <div class="stats-row">
            <span id="progress-text">0/0 complete</span>
            <span id="streak-text">0 day streak</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
          <div class="focus" id="focus-display">Start with the beginner path</div>
        </div>
      </div>

      <div class="search-box">
        <input id="search-input" type="search" placeholder="Search topics, e.g. Kafka or tokenization">
      </div>

      <nav class="nav-tree" id="nav-tree"></nav>

      <div class="sidebar-footer">
        <button class="quiz-button" id="quiz-button">Quick Quiz</button>
      </div>
    </aside>

    <main class="content">
      <header class="topbar">
        <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle navigation">Menu</button>
        <div class="breadcrumb" id="breadcrumb">Home</div>
      </header>

      <div class="content-layout">
        <article class="markdown-body" id="markdown-content">
          <div class="loading">Loading...</div>
        </article>
        <aside class="toc-sidebar" id="toc-sidebar">
          <div class="toc-title">On this page</div>
          <nav id="toc-nav"></nav>
        </aside>
      </div>
    </main>
  </div>

  <div class="modal" id="quiz-modal" aria-hidden="true">
    <div class="modal-scrim" id="quiz-close-scrim"></div>
    <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="quiz-title">
      <div class="modal-header">
        <h2 id="quiz-title">Visa Prep Quick Quiz</h2>
        <button class="icon-button" id="quiz-close" aria-label="Close quiz">x</button>
      </div>
      <div class="quiz-card">
        <div class="quiz-meta" id="quiz-meta"></div>
        <div class="quiz-question" id="quiz-question"></div>
        <div class="quiz-options" id="quiz-options"></div>
        <div class="quiz-explanation" id="quiz-explanation"></div>
      </div>
      <div class="modal-actions">
        <button class="secondary-button" id="quiz-show-answer">Show Answer</button>
        <button class="primary-button" id="quiz-next">Next Question</button>
      </div>
    </section>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/java.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script src="data/questions.js"></script>
  <script src="app.js"></script>
</body>
</html>
